<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — ExamShield</title>
  <link rel="stylesheet" href="css/admin.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body class="admin-login-page">

  <div class="bg-grid"></div>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>

  <div class="admin-login-container">
    <div class="admin-brand">
      <div class="brand-icon">
        <i class="fas fa-user-shield"></i>
      </div>
      <h1>Exam<span>Shield</span></h1>
      <p>Administration Portal</p>
      <span class="admin-badge"><i class="fas fa-lock"></i> Restricted Access</span>
    </div>

    <div class="login-card">
      <h2><i class="fas fa-right-to-bracket" style="color:var(--primary);margin-right:0.4rem"></i>Admin Login</h2>

      <div id="error-msg" class="error-banner hidden">
        <i class="fas fa-exclamation-circle"></i>
        <span id="error-text">Invalid credentials.</span>
      </div>

      <div class="form-group">
        <label><i class="fas fa-user"></i> Username</label>
        <input type="text" id="admin-user" placeholder="Enter username" value="admin" />
      </div>

      <div class="form-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="admin-pass" placeholder="Enter password" value="admin123" />
      </div>

      <button class="btn-primary" id="login-btn" onclick="adminLogin()">
        <span id="btn-text"><i class="fas fa-sign-in-alt"></i> Login to Dashboard</span>
        <span id="btn-loader" class="hidden"><i class="fas fa-circle-notch fa-spin"></i> Authenticating...</span>
      </button>

      <div style="text-align:center;margin-top:1rem">
        <a href="../index.html" style="color:var(--text-muted);font-size:0.82rem;text-decoration:none">
          <i class="fas fa-arrow-left"></i> Back to Student Portal
        </a>
      </div>
    </div>

    <p style="text-align:center;font-size:0.75rem;color:var(--text-dim);margin-top:1rem">
      Default credentials: admin / admin123
    </p>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
