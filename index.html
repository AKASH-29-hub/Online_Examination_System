<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExamShield — Online Exam System</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body class="login-page">

  <!-- Animated background grid -->
  <div class="bg-grid"></div>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>

  <div class="login-container">
    <div class="login-brand">
      <div class="brand-icon">
        <i class="fas fa-shield-halved"></i>
      </div>
      <h1>Exam<span>Shield</span></h1>
      <p>Secure Online Assessment Platform</p>
    </div>

    <div class="login-card">
      <div class="login-card-header">
        <h2>Student Login</h2>
        <span class="login-badge"><i class="fas fa-lock"></i> Secure Session</span>
      </div>

      <div id="error-msg" class="error-banner hidden">
        <i class="fas fa-exclamation-circle"></i>
        <span id="error-text">Please fill in all fields.</span>
      </div>

      <div class="form-group">
        <label for="student-name">
          <i class="fas fa-user"></i> Full Name
        </label>
        <input
          type="text"
          id="student-name"
          placeholder="Enter your full name"
          autocomplete="off"
        />
      </div>

      <div class="form-group">
        <label for="student-id">
          <i class="fas fa-id-badge"></i> Student ID
        </label>
        <input
          type="text"
          id="student-id"
          placeholder="e.g. STU2024001"
          autocomplete="off"
        />
      </div>

      <button class="btn-primary" id="login-btn" onclick="handleLogin()">
        <span id="btn-text">
          <i class="fas fa-arrow-right-to-bracket"></i> Proceed to Exam
        </span>
        <span id="btn-loader" class="hidden">
          <i class="fas fa-circle-notch fa-spin"></i> Loading...
        </span>
      </button>

      <div class="login-footer">
        <a href="admin/login.html">
          <i class="fas fa-user-shield"></i> Admin Panel
        </a>
      </div>
    </div>

    <div class="features-strip">
      <div class="feature-pill">
        <i class="fas fa-clock"></i> 30 Min Timer
      </div>
      <div class="feature-pill">
        <i class="fas fa-camera"></i> Webcam Monitored
      </div>
      <div class="feature-pill">
        <i class="fas fa-shield-halved"></i> Anti-Cheat
      </div>
      <div class="feature-pill">
        <i class="fas fa-shuffle"></i> Randomized
      </div>
    </div>
  </div>

  <script>
    function handleLogin() {
      const name = document.getElementById("student-name").value.trim();
      const id = document.getElementById("student-id").value.trim();
      const errorEl = document.getElementById("error-msg");
      const errorText = document.getElementById("error-text");

      if (!name || !id) {
        errorText.textContent = "Please fill in your name and Student ID.";
        errorEl.classList.remove("hidden");
        errorEl.classList.add("shake");
        setTimeout(() => errorEl.classList.remove("shake"), 500);
        return;
      }

      errorEl.classList.add("hidden");

      // Show loader
      document.getElementById("btn-text").classList.add("hidden");
      document.getElementById("btn-loader").classList.remove("hidden");

      // Store in session
      sessionStorage.setItem("studentName", name);
      sessionStorage.setItem("studentId", id);

      setTimeout(() => {
        window.location.href = "instructions.html";
      }, 800);
    }

    // Allow Enter key
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleLogin();
    });

    // Animate feature pills on load
    document.querySelectorAll(".feature-pill").forEach((pill, i) => {
      pill.style.animationDelay = `${i * 0.15}s`;
    });
  </script>
</body>
</html>
